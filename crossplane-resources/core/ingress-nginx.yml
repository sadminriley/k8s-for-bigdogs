apiVersion: helm.crossplane.io/v1beta1
kind: Release
metadata:
  name: ingress-nginx
spec:
  forProvider:
    chart:
      name: ingress-nginx
      repository: https://kubernetes.github.io/ingress-nginx
      version: "4.12.0"
    namespace: ingress-nginx
    skipCreateNamespace: false
    values:
      controller:
        service:
          type: LoadBalancer
    wait: true
    waitTimeout: 600s
  providerConfigRef:
    name: helm-provider
