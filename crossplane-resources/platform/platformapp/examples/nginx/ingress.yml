apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-nginx
  namespace: demo-nginx
spec:
  ingressClassName: nginx
  rules:
    - host: demo-nginx.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-nginx-7b8j7
                port:
                  number: 80
