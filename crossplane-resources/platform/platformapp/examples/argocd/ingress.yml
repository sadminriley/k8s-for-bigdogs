apiVersion: kubernetes.crossplane.io/v1alpha2
kind: Object
metadata:
  name: argocd-ingress
spec:
  providerConfigRef:
    name: local-cluster
  forProvider:
    manifest:
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: argocd-server
        namespace: argocd
        annotations:
          cert-manager.io/cluster-issuer: selfsigned-issuer
          nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      spec:
        ingressClassName: nginx
        tls:
          - hosts:
              - argocd.dev
            secretName: argocd-server-tls
        rules:
          - host: argocd.dev
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: argocd-server
                      port:
                        number: 80
