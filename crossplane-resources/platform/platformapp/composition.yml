apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: platformapp-helm
spec:
  compositeTypeRef:
    apiVersion: platform.stacksecure.io/v1alpha1
    kind: XPlatformApp

  mode: Pipeline

  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: app-namespace
            base:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.namespace
                toFieldPath: metadata.name

          - name: helm-release
            base:
              apiVersion: helm.crossplane.io/v1beta1
              kind: Release
              spec:
                forProvider:
                  namespace: default
                  skipCreateNamespace: true
                  wait: true
                  waitTimeout: 600s
                  chart:
                    name: nginx
                    repository: https://charts.bitnami.com/bitnami
                    version: "18.1.15"
                  values: {}
                providerConfigRef:
                  name: helm-provider
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: metadata.name

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.namespace
                toFieldPath: spec.forProvider.namespace

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.chartName
                toFieldPath: spec.forProvider.chart.name

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.chartRepository
                toFieldPath: spec.forProvider.chart.repository

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.chartVersion
                toFieldPath: spec.forProvider.chart.version

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.values
                toFieldPath: spec.forProvider.values
                policy:
                  fromFieldPath: Optional
