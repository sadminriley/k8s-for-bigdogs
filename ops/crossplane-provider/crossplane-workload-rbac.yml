apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-platformworkload-manager
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - namespaces/status
      - services
      - services/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  - apiGroups: ["apps"]
    resources:
      - deployments
      - deployments/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - ingresses/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete


  - apiGroups: ["cert-manager.io"]
    resources:
      - certificates
      - certificates/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete


---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane-platformworkload-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-platformworkload-manager
subjects:
  - kind: ServiceAccount
    name: crossplane
    namespace: crossplane-system
